<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ride Booking</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#b7642e;
font-family: 'Poppins', sans-serif;
}

.order-box{
background:#e7f05a;
border-radius:30px;
padding:25px;
}

input,select{
width:100%;
padding:12px;
border-radius:15px;
background:#eeeeee;
}

.order-btn{
background:#e7f05a;
color:red;
font-weight:bold;
font-size:26px;
padding:10px 40px;
border-radius:25px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="w-full bg-[#F5E9D8] py-4 flex items-center justify-center relative">

<img src="startup.png" class="absolute left-4 w-10 md:w-14">

<h1 class="text-3xl md:text-5xl font-bold text-black">
AN SERVICES
</h1>

</div>



<!-- PAGE CONTAINER -->

<div class="max-w-md mx-auto px-5 py-10">

<!-- TITLE -->

<div class="flex items-center justify-center mb-6">

<div class="bg-[#e7f05a] p-3 rounded-xl shadow mr-3">
<img src="ride.png" class="w-8">
</div>

<h2 class="text-3xl font-bold bg-[#e7f05a] px-6 py-2 rounded-full">
Book your ride buddy
</h2>

</div>



<!-- BOOKING BOX -->

<div class="order-box space-y-3">

<input id="name" placeholder="Name">

<select id="pickup">
<option value="">Pick up location</option>
<option>Location 1</option>
<option>Location 2</option>
<option>Location 3</option>
<option>Location 4</option>
<option>Location 5</option>
<option>Location 6</option>
<option>Location 7</option>
<option>Location 8</option>
<option>Location 9</option>
<option>Location 10</option>
</select>

<select id="drop">
<option value="">Drop location</option>
<option>Location 1</option>
<option>Location 2</option>
<option>Location 3</option>
<option>Location 4</option>
<option>Location 5</option>
<option>Location 6</option>
<option>Location 7</option>
<option>Location 8</option>
<option>Location 9</option>
<option>Location 10</option>
</select>


<!-- FARE DISPLAY -->

<div class="text-xl font-semibold text-center">
Fare: ₹ <span id="fare">0</span>
</div>


<input id="phone" placeholder="Phone Number">

<input id="location" placeholder="Your location">

<button onclick="getLocation()" class="underline text-sm">
Use my current location
</button>

</div>


<div class="text-center">

<button onclick="bookRide()" class="order-btn">
Book Ride
</button>

</div>

</div>



<script>

/* GOOGLE SHEETS WEBHOOK */

const GOOGLE_SCRIPT_URL="PASTE_SCRIPT_URL";

/* TELEGRAM */

const TELEGRAM_BOT_TOKEN="PASTE_BOT_TOKEN";
const TELEGRAM_CHAT_ID="PASTE_CHAT_ID";


/* FARE TABLE (EDIT HERE MANUALLY) */

const fares={

"Location 1-Location 2":40,
"Location 1-Location 3":60,
"Location 1-Location 4":70,

"Location 2-Location 3":30,
"Location 2-Location 4":50,

"Location 3-Location 4":40,

};


/* FARE CALCULATION */

document.getElementById("pickup").onchange=calculateFare;
document.getElementById("drop").onchange=calculateFare;

function calculateFare(){

const pickup=document.getElementById("pickup").value;
const drop=document.getElementById("drop").value;

const key=pickup+"-"+drop;

if(fares[key]){
document.getElementById("fare").innerText=fares[key];
}else{
document.getElementById("fare").innerText="0";
}

}


/* LOCATION */

function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("location").value=lat+","+lon;

});

}


/* BOOK RIDE */

function bookRide(){

const name=document.getElementById("name").value;
const pickup=document.getElementById("pickup").value;
const drop=document.getElementById("drop").value;
const fare=document.getElementById("fare").innerText;
const phone=document.getElementById("phone").value;
const location=document.getElementById("location").value;


/* GOOGLE SHEETS */

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
service:"ride",
name:name,
pickup:pickup,
drop:drop,
fare:fare,
phone:phone,
location:location
})
});


/* TELEGRAM */

const message=
`NEW RIDE BOOKING

Name: ${name}

Pickup: ${pickup}
Drop: ${drop}

Fare: ₹${fare}

Phone: ${phone}

Location:
https://maps.google.com/?q=${location}`;

fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
chat_id:TELEGRAM_CHAT_ID,
text:message
})

});


alert("Ride booked!");

}

</script>

</body>
</html>
