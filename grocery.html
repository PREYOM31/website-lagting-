<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grocery Order</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#b7642e;
font-family:sans-serif;
}

.order-box{
background:#e7f05a;
border-radius:30px;
padding:25px;
}

input{
width:100%;
padding:12px;
border-radius:15px;
background:#eeeeee;
}

.order-btn{
background:#e7f05a;
color:red;
font-weight:bold;
font-size:26px;
padding:10px 40px;
border-radius:25px;
margin-top:20px;
}

</style>

</head>

<body>


<!-- HEADER -->

<div class="w-full bg-[#F5E9D8] py-4 flex items-center justify-center relative">

<img src="startup.png" class="absolute left-4 w-10 md:w-14">

<h1 class="text-3xl md:text-5xl font-bold text-black">
AN SERVICES
</h1>

</div>



<!-- PAGE CONTAINER -->

<div class="max-w-md mx-auto px-5 py-10">


<!-- ITEM TITLE -->

<div class="flex items-center justify-center mb-6">

<div class="bg-[#e7f05a] p-3 rounded-xl shadow mr-3">

<img src="grocery.png" class="w-8">

</div>

<h2 class="text-3xl font-bold bg-[#e7f05a] px-6 py-2 rounded-full">
Items
</h2>

</div>



<!-- ORDER BOX -->

<div class="order-box space-y-3">

<input id="itemName" placeholder="Item name">

<input id="itemQty" placeholder="Quantity">

<button onclick="addItem()" class="bg-black text-white w-full py-2 rounded">
Add Item
</button>

<div id="itemList" class="text-left"></div>

<input id="phone" placeholder="Phone Number">

<input id="location" placeholder="Location">

<button onclick="getLocation()" class="underline text-sm">
Use my current location
</button>

</div>


<div class="text-center">

<button onclick="placeOrder()" class="order-btn">
order
</button>

</div>


</div>

</body>



<script>

/* ORDER ITEMS ARRAY */

let orderItems = [];


/* ADD ITEM FUNCTION */

function addItem(){

const name = document.getElementById("itemName").value;
const qty = document.getElementById("itemQty").value;

if(name === "" || qty === ""){
alert("Enter item and quantity");
return;
}

orderItems.push({name, qty});

renderItems();

document.getElementById("itemName").value="";
document.getElementById("itemQty").value="";

}

/* GOOGLE SHEETS WEBHOOK */

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyafCBiN8TOQpU-whWs21oa2TE2l53IeIosyKOXUb5Ruz6K4fBWevjArHKb8jlEBORu/exec";

/* TELEGRAM BOT */

const TELEGRAM_BOT_TOKEN = "7960387937:AAGR9ciq7We-h-ssWUKDyFdmUYTFrbb04A4";
const TELEGRAM_CHAT_ID = "6866823479";


function getLocation(){

navigator.geolocation.getCurrentPosition(function(position){

const lat = position.coords.latitude;
const lon = position.coords.longitude;

document.getElementById("location").value = lat + "," + lon;

});

}
function renderItems(){

const container = document.getElementById("itemList");
container.innerHTML = "";

orderItems.forEach((item,index)=>{

const row = document.createElement("div");
row.className="item-row";

row.innerHTML = `
<span>${item.name}</span>
<span>${item.qty}</span>

<div class="space-x-2">

<button onclick="editItem(${index})" class="text-blue-600 text-sm">
Edit
</button>

<button onclick="removeItem(${index})" class="text-red-600 text-sm">
Remove
</button>

</div>
`;

container.appendChild(row);

});

}



function removeItem(index){

orderItems.splice(index,1);

renderItems();

}



function editItem(index){

const item = orderItems[index];

document.getElementById("itemName").value = item.name;
document.getElementById("itemQty").value = item.qty;

orderItems.splice(index,1);

renderItems();

}



function placeOrder(){

if(orderItems.length === 0){
alert("Add at least one item");
return;
}

const items = orderItems
.map(i => i.name + " - " + i.qty)
.join(", ");
const phone = document.getElementById("phone").value;
const location = document.getElementById("location").value;



/* SEND TO GOOGLE SHEETS */

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
service:"grocery",
items:items,
phone:phone,
location:location
})
});



/* SEND TELEGRAM MESSAGE */

const message =
`NEW GROCERY ORDER

Items: ${items}

Phone: ${phone}

Location:
https://maps.google.com/?q=${location}`;

fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:TELEGRAM_CHAT_ID,
text:message
})
});


alert("Order sent successfully!");



/* RESET INTERFACE AFTER ORDER */

orderItems = [];

document.getElementById("itemList").innerHTML="";
document.getElementById("phone").value="";
document.getElementById("location").value="";
document.getElementById("itemName").value="";
document.getElementById("itemQty").value="";

}

</script>


</body>
</html>
