<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AN SERVICES</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#b7642e;
font-family:sans-serif;
}

.widget{
background:#e7f05a;
border-radius:24px;
width:140px;
height:140px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 6px 12px rgba(0,0,0,0.25);
}

.widget img{
width:80px;
height:80px;
object-fit:contain;
}

.label{
font-weight:700;
font-size:22px;
margin-top:10px;
}

</style>

</head>

<body class="min-h-screen">

<!-- TOP HEADER STRIP -->
<div class="w-full bg-[#F5E9D8] py-6 flex items-center justify-center relative">

<img src="startup.png" class="absolute left-6 w-20">

<h1 class="text-5xl md:text-6xl font-bold text-black text-center">
AN SERVICES
</h1>

</div>


<!-- SERVICE GRID -->

<div class="flex justify-center mt-12">

<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-14 text-center">


<!-- Grocery -->
<div onclick="go('grocery.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="grocery.png">
</div>
<div class="label">Grocery</div>
</div>


<!-- Foods -->
<div onclick="go('food.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="plate.png">
</div>
<div class="label">Foods</div>
</div>


<!-- Parcel -->
<div onclick="go('parcel.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="parcel.png">
</div>
<div class="label">Parcel</div>
</div>


<!-- Medicine -->
<div onclick="go('medicine.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="medicine.png">
</div>
<div class="label">Medicine</div>
</div>


<!-- Shopping -->
<div onclick="go('shopping.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="shopping.png">
</div>
<div class="label">Shopping</div>
</div>


<!-- Documents -->
<div onclick="go('documents.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="documents.png">
</div>
<div class="label">Documents</div>
</div>


<!-- Ride -->
<div onclick="go('ride.html')" class="cursor-pointer">
<div class="widget mx-auto">
<img src="ride.png">
</div>
<div class="label">Ride</div>
</div>


</div>

</div>


<script>

function go(page){
window.location.href = page;
}

</script>

</body>
</html>
