<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Order</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#b7642e;
font-family:sans-serif;
}

.order-box{
background:#e7f05a;
border-radius:30px;
padding:25px;
}

input,select{
width:100%;
padding:12px;
border-radius:15px;
background:#eeeeee;
}

.order-btn{
background:#e7f05a;
color:red;
font-weight:bold;
font-size:26px;
padding:10px 40px;
border-radius:25px;
margin-top:20px;
}

.item-row{
display:flex;
justify-content:space-between;
background:white;
padding:6px 10px;
border-radius:10px;
margin-top:6px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="w-full bg-[#F5E9D8] py-4 flex items-center justify-center relative">

<img src="startup.png" class="absolute left-4 w-10 md:w-14">

<h1 class="text-3xl md:text-5xl font-bold text-black">
AN SERVICES
</h1>

</div>



<!-- PAGE CONTAINER -->

<div class="max-w-md mx-auto px-5 py-10">

<!-- TITLE -->

<div class="flex items-center justify-center mb-6">

<div class="bg-[#e7f05a] p-3 rounded-xl shadow mr-3">
<img src="plate.png" class="w-8">
</div>

<h2 class="text-3xl font-bold bg-[#e7f05a] px-6 py-2 rounded-full">
Food
</h2>

</div>


<!-- ORDER BOX -->

<div class="order-box space-y-3">

<select id="restaurant">
<option value="">Select Restaurant</option>
<option>Restaurant 1</option>
<option>Restaurant 2</option>
<option>Restaurant 3</option>
<option>Restaurant 4</option>
<option>Restaurant 5</option>
<option>Restaurant 6</option>
<option>Restaurant 7</option>
</select>

<input id="itemName" placeholder="Item name">

<input id="itemQty" placeholder="Quantity">

<button onclick="addItem()" class="bg-black text-white w-full py-2 rounded">
Add Item
</button>

<div id="itemList"></div>

<input id="phone" placeholder="Phone Number">

<input id="location" placeholder="Location">

<button onclick="getLocation()" class="underline text-sm">
Use my current location
</button>

</div>


<div class="text-center">

<button onclick="placeOrder()" class="order-btn">
order
</button>

</div>

</div>



<script>

let orderItems = [];

/* GOOGLE SHEET WEBHOOK */
const GOOGLE_SCRIPT_URL = "PASTE_GOOGLE_SCRIPT_URL";

/* TELEGRAM */
const TELEGRAM_BOT_TOKEN = "PASTE_BOT_TOKEN";
const TELEGRAM_CHAT_ID = "PASTE_CHAT_ID";


function addItem(){

const name=document.getElementById("itemName").value;
const qty=document.getElementById("itemQty").value;

if(name==""||qty==""){
alert("Enter item and quantity");
return;
}

orderItems.push(name+" - "+qty);

const row=document.createElement("div");
row.className="item-row";
row.innerHTML="<span>"+name+"</span><span>"+qty+"</span>";

document.getElementById("itemList").appendChild(row);

document.getElementById("itemName").value="";
document.getElementById("itemQty").value="";

}



function getLocation(){

navigator.geolocation.getCurrentPosition(function(pos){

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("location").value=lat+","+lon;

});

}



function placeOrder(){

if(orderItems.length===0){
alert("Add items first");
return;
}

const restaurant=document.getElementById("restaurant").value;
const phone=document.getElementById("phone").value;
const location=document.getElementById("location").value;
const items=orderItems.join(", ");


/* SEND TO GOOGLE SHEETS */

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
service:"food",
restaurant:restaurant,
items:items,
phone:phone,
location:location
})
});


/* TELEGRAM MESSAGE */

const message=
`NEW FOOD ORDER

Restaurant: ${restaurant}

Items:
${items}

Phone: ${phone}

Location:
https://maps.google.com/?q=${location}`;


fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:TELEGRAM_CHAT_ID,
text:message
})
});


alert("Order sent!");

orderItems=[];
document.getElementById("itemList").innerHTML="";
document.getElementById("phone").value="";
document.getElementById("location").value="";
document.getElementById("restaurant").value="";

}

</script>

</body>
</html>
